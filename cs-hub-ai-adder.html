<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CS Hub — AI Resource Adder</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&family=DM+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --navy:#1a3a5c; --amber:#e8a020; --blue:#2a7fc1;
  --bg:#f0f4f8; --surface:#fff; --border:#dde3ec;
  --text:#1c2b3a; --muted:#6b7c93;
  --green:#059669; --greenBg:#d1fae5;
  --red:#dc2626; --redBg:#fee2e2;
  --radius:12px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:"DM Sans",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
header{background:var(--navy);color:#fff;padding:0 2rem}
.hi{max-width:800px;margin:0 auto;display:flex;align-items:center;height:56px;gap:1rem}
.logo{font-family:"DM Serif Display",serif;font-size:1.2rem}
.logo span{color:var(--amber)}
.main{max-width:800px;margin:0 auto;padding:2rem 1.5rem}
.card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:1.5rem;margin-bottom:1.25rem;box-shadow:0 2px 12px rgba(26,58,92,.07)}
h2{font-size:1.05rem;font-weight:600;margin-bottom:.35rem}
p{font-size:.85rem;color:var(--muted);line-height:1.6;margin-bottom:1rem}
.row{display:flex;gap:.75rem}
input[type=url],input[type=text],select,textarea{
  width:100%;padding:.6rem .85rem;border:1.5px solid var(--border);border-radius:8px;
  font-size:.88rem;font-family:"DM Sans",sans-serif;color:var(--text);outline:none;
  transition:border-color .2s;background:#fff}
input:focus,select:focus,textarea:focus{border-color:var(--blue)}
textarea{resize:vertical;min-height:55px}
.btn{padding:.65rem 1.25rem;border-radius:8px;border:none;font-size:.87rem;font-weight:600;
  cursor:pointer;font-family:"DM Sans",sans-serif;transition:all .2s;display:inline-flex;align-items:center;gap:.4rem}
.btn-navy{background:var(--navy);color:#fff}
.btn-navy:hover{background:var(--blue)}
.btn-navy:disabled{opacity:.55;cursor:not-allowed}
.btn-green{background:var(--green);color:#fff}
.btn-green:hover{background:#047857}
.btn-green:disabled{opacity:.55;cursor:not-allowed}
.btn-ghost{background:transparent;color:var(--navy);border:1.5px solid var(--border)}
.btn-ghost:hover{border-color:var(--navy)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:.85rem;margin-bottom:.85rem}
.full{grid-column:1/-1}
label{display:block;font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:.3rem}
.field{margin-bottom:0}
.status{padding:.75rem 1rem;border-radius:8px;font-size:.83rem;margin-top:.75rem;
  display:none;line-height:1.5;word-break:break-all}
.status.show{display:block}
.status.info{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe}
.status.error{background:var(--redBg);color:var(--red);border:1px solid #fecaca}
.status.ok{background:var(--greenBg);color:var(--green);border:1px solid #bbf7d0}
.thinking{display:none;align-items:center;gap:.75rem;padding:.75rem 0;font-size:.83rem;color:var(--muted)}
.thinking.show{display:flex}
.spin{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--blue);
  border-radius:50%;animation:spin .6s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.result{display:none}
.result.show{display:block}
.ai-note{font-size:.78rem;color:var(--muted);background:#f8fafc;padding:.6rem .85rem;
  border-radius:6px;border-left:3px solid var(--blue);margin-bottom:1rem;line-height:1.5}
.conf{font-size:.7rem;font-weight:700;padding:.2rem .55rem;border-radius:12px;display:inline-block;margin-bottom:.75rem}
.conf.high{background:var(--greenBg);color:var(--green)}
.conf.med{background:#fef3c7;color:#92400e}
.conf.low{background:var(--redBg);color:var(--red)}
.actions{display:flex;gap:.75rem;flex-wrap:wrap;margin-top:1rem}
.hist{margin-top:1.5rem}
.hist h3{font-size:.75rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:.6rem}
.hist-item{background:var(--surface);border:1px solid var(--border);border-radius:8px;
  padding:.6rem .9rem;margin-bottom:.4rem;display:flex;align-items:center;gap:.65rem;font-size:.83rem}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot.added{background:var(--green)}.dot.skip{background:var(--muted)}
.tag{font-size:.67rem;padding:.13rem .4rem;border-radius:10px;font-weight:600}
.tag.added{background:var(--greenBg);color:var(--green)}
.tag.skip{background:#f1f5f9;color:var(--muted)}
.meta{font-size:.72rem;color:var(--muted)}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;padding:.7rem 1rem;border-radius:8px;
  font-size:.84rem;font-weight:500;color:#fff;box-shadow:0 4px 20px rgba(0,0,0,.2);
  transform:translateY(60px);opacity:0;transition:all .3s;z-index:999}
.toast.show{transform:translateY(0);opacity:1}
.toast.ok{background:var(--green)}.toast.err{background:var(--red)}
@media(max-width:580px){.grid2{grid-template-columns:1fr}.row{flex-direction:column}}
</style>
</head>
<body>

<header>
  <div class="hi">
    <div class="logo">CS<span>Hub</span></div>
    <span style="font-size:.8rem;opacity:.6">AI Resource Adder</span>
    <a href="index.html" style="margin-left:auto;font-size:.8rem;color:rgba(255,255,255,.65);text-decoration:none">← Back to Hub</a>
  </div>
</header>

<div class="main">

  <!-- URL INPUT -->
  <div class="card">
    <h2>Add a Resource with AI</h2>
    <p>Paste any educational URL. The AI will suggest which year group, topic and lesson it belongs to. You can edit the suggestion before adding it to the sheet.</p>
    <div class="row">
      <input type="url" id="urlInput" placeholder="https://www.bbc.co.uk/bitesize/...">
      <button class="btn btn-navy" id="analyseBtn" onclick="doAnalyse()">Analyse</button>
    </div>
    <div class="status" id="statusBox"></div>
    <div class="thinking" id="thinking">
      <div class="spin"></div>
      <span id="thinkMsg">Analysing...</span>
    </div>
  </div>

  <!-- RESULT -->
  <div class="card result" id="resultCard">
    <div class="conf" id="confBadge"></div>
    <div class="ai-note" id="aiNote"></div>

    <div class="grid2">
      <div class="field">
        <label>Year Group</label>
        <select id="fYearGroup">
          <option>Year 5</option><option>Year 6</option><option>Year 7</option>
          <option>Year 8</option><option>Year 9</option><option>iGCSE</option><option>IB</option>
        </select>
      </div>
      <div class="field">
        <label>Topic</label>
        <input type="text" id="fTopic">
      </div>
      <div class="field">
        <label>Subtopic (iGCSE/IB only)</label>
        <input type="text" id="fSubtopic" placeholder="Leave blank for Year 5-9">
      </div>
      <div class="field">
        <label>Lesson</label>
        <input type="text" id="fLesson">
      </div>
      <div class="field full">
        <label>Resource Title</label>
        <input type="text" id="fTitle">
      </div>
      <div class="field full">
        <label>Link (URL)</label>
        <input type="url" id="fLink">
      </div>
      <div class="field">
        <label>Type</label>
        <select id="fType">
          <option>Link</option><option>Video</option><option>Slides</option>
          <option>Doc</option><option>Quiz</option><option>Worksheet</option><option>Code</option>
        </select>
      </div>
      <div class="field">
        <label>Show to Students</label>
        <select id="fShow">
          <option value="TRUE">Yes — show to students</option>
          <option value="FALSE">No — staff only</option>
        </select>
      </div>
      <div class="field full">
        <label>Notes (optional)</label>
        <textarea id="fNotes" placeholder="Any notes for staff..."></textarea>
      </div>
    </div>

    <div class="actions">
      <button class="btn btn-green" id="addBtn" onclick="doAdd()">Add to Sheet</button>
      <button class="btn btn-ghost" onclick="doSkip()">Skip</button>
      <button class="btn btn-ghost" onclick="doReset()">Try another URL</button>
    </div>
  </div>

  <!-- HISTORY -->
  <div class="hist" id="histSection" style="display:none">
    <h3>This session</h3>
    <div id="histList"></div>
  </div>

</div>
<div class="toast" id="toast"></div>

<script>
// ── CONFIG ────────────────────────────────────────────────────
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxigE0VUyBr6xMOEt_hmJ72pYfQuXx2E1husqMVQCi-dh-7o2rOBe4SdsmrEQ8X3kSf/exec";
// ─────────────────────────────────────────────────────────────

let history = [];

function setStatus(msg, type) {
  const el = document.getElementById("statusBox");
  el.textContent = msg;
  el.className = "status show " + type;
}
function clearStatus() {
  document.getElementById("statusBox").className = "status";
}
function setThinking(msg) {
  const el = document.getElementById("thinking");
  el.className = msg ? "thinking show" : "thinking";
  if (msg) document.getElementById("thinkMsg").textContent = msg;
}
function showResult(show) {
  document.getElementById("resultCard").className = show ? "card result show" : "card result";
}
function toast(msg, type) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast show " + (type === "ok" ? "ok" : "err");
  setTimeout(() => t.classList.remove("show"), 3000);
}

async function doAnalyse() {
  const url = document.getElementById("urlInput").value.trim();

  if (!url) { setStatus("Please enter a URL.", "error"); return; }
  if (!url.startsWith("http")) { setStatus("URL must start with http:// or https://", "error"); return; }

  clearStatus();
  showResult(false);
  document.getElementById("analyseBtn").disabled = true;
  setThinking("Calling AI...");

  try {
    setStatus("Sending request to Apps Script...", "info");

    const fetchUrl = SCRIPT_URL + "?action=analyse&url=" + encodeURIComponent(url);
    setStatus("Fetching: " + fetchUrl.substring(0, 100) + "...", "info");

    const resp = await fetch(fetchUrl);
    setStatus("Got response. Status: " + resp.status + ". Reading...", "info");

    const raw = await resp.text();
    setStatus("Raw response: " + raw.substring(0, 300), "info");

    const data = JSON.parse(raw);

    if (data.status === "error") {
      throw new Error(data.message || "AI returned an error");
    }

    const r = data.result;
    if (!r) throw new Error("No result in response");

    // Fill form
    document.getElementById("fYearGroup").value = r.yearGroup || "Year 7";
    document.getElementById("fTopic").value     = r.topic     || "";
    document.getElementById("fSubtopic").value  = r.subtopic  || "";
    document.getElementById("fLesson").value    = r.lesson    || "";
    document.getElementById("fTitle").value     = r.title     || "";
    document.getElementById("fLink").value      = url;
    document.getElementById("fType").value      = r.type      || "Link";
    document.getElementById("fShow").value      = "TRUE";
    document.getElementById("fNotes").value     = "";

    const conf = (r.confidence || "medium").toLowerCase();
    const badge = document.getElementById("confBadge");
    badge.textContent = conf.charAt(0).toUpperCase() + conf.slice(1) + " confidence";
    badge.className = "conf " + (conf === "high" ? "high" : conf === "low" ? "low" : "med");

    document.getElementById("aiNote").textContent = "AI: " + (r.reasoning || "");

    clearStatus();
    setThinking("");
    showResult(true);

  } catch (err) {
    setThinking("");
    setStatus("Error: " + err.message, "error");
  }

  document.getElementById("analyseBtn").disabled = false;
}

async function doAdd() {
  const row = {
    action:    "addRow",
    yearGroup: document.getElementById("fYearGroup").value,
    topic:     document.getElementById("fTopic").value.trim(),
    subtopic:  document.getElementById("fSubtopic").value.trim(),
    lesson:    document.getElementById("fLesson").value.trim(),
    title:     document.getElementById("fTitle").value.trim(),
    link:      document.getElementById("fLink").value.trim(),
    type:      document.getElementById("fType").value,
    show:      document.getElementById("fShow").value,
    notes:     document.getElementById("fNotes").value.trim(),
  };

  if (!row.title || !row.link) { setStatus("Please fill in Title and Link.", "error"); return; }

  document.getElementById("addBtn").disabled = true;
  document.getElementById("addBtn").textContent = "Adding...";

  try {
    const params = new URLSearchParams(row).toString();
    const resp = await fetch(SCRIPT_URL + "?" + params);
    const data = await resp.json();
    if (data.status === "error") throw new Error(data.message);

    addHist(row, "added");
    toast("Added to sheet!", "ok");
    doReset();
  } catch (err) {
    setStatus("Could not add: " + err.message, "error");
  }

  document.getElementById("addBtn").disabled = false;
  document.getElementById("addBtn").textContent = "Add to Sheet";
}

function doSkip() {
  addHist({ title: document.getElementById("fTitle").value || "Unknown" }, "skip");
  doReset();
}

function doReset() {
  document.getElementById("urlInput").value = "";
  clearStatus();
  showResult(false);
  setThinking("");
  document.getElementById("analyseBtn").disabled = false;
  document.getElementById("urlInput").focus();
}

function addHist(row, status) {
  history.unshift({ row, status });
  const sec = document.getElementById("histSection");
  sec.style.display = "block";
  document.getElementById("histList").innerHTML = history.slice(0, 10).map(h =>
    "<div class='hist-item'>" +
    "<div class='dot " + h.status + "'></div>" +
    "<div style='flex:1'>" +
    "<div>" + (h.row.title || "Unknown") + "</div>" +
    "<div class='meta'>" + (h.status === "added" ? (h.row.yearGroup + " · " + h.row.topic) : "Skipped") + "</div>" +
    "</div>" +
    "<span class='tag " + h.status + "'>" + h.status + "</span>" +
    "</div>"
  ).join("");
}

// Allow Enter key in URL input
document.getElementById("urlInput").addEventListener("keydown", function(e) {
  if (e.key === "Enter") doAnalyse();
});
</script>
</body>
</html>
