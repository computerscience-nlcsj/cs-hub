<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Computer Science — NLCS Jeju</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f7f9fc;color:#1a2a3a;min-height:100vh}
:root{--blue:#3a75bf;--dark:#1a2a3a;--mid:#4a6080;--light:#8a9ab0;--rule:#d8e4f0;--bg:#f7f9fc;--surface:#fff}

/* HEADER */
header{background:var(--dark);position:sticky;top:0;z-index:200}
.hd{max-width:1280px;margin:0 auto;padding:0 2rem;display:flex;align-items:center;height:52px;gap:0}
.hd-logo{font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:#fff}
.hd-sep{width:1px;height:14px;background:rgba(255,255,255,0.2);margin:0 14px}
.hd-dept{font-size:10px;color:rgba(255,255,255,0.5);letter-spacing:2px;text-transform:uppercase}
.hd-right{margin-left:auto;display:flex;align-items:center;gap:1.5rem}
.hd-search input{font-size:10px;color:#fff;border:none;outline:none;background:none;
  width:180px;font-family:inherit;padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.2);
  transition:border-color .2s;letter-spacing:0.3px}
.hd-search input:focus{border-bottom-color:var(--blue)}
.hd-search input::placeholder{color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:1px;font-size:9px}
.hd-link{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  color:rgba(255,255,255,0.5);cursor:pointer;text-decoration:none;transition:color .15s}
.hd-link:hover{color:#fff}
.staff-pill{font-size:8px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  color:var(--blue);background:rgba(58,117,191,0.2);padding:3px 9px}

/* BLUE BAR */
.blue-bar{height:3px;background:var(--blue)}

/* YEAR TABS */
.tabs-bar{background:var(--dark);border-bottom:1px solid rgba(255,255,255,0.08);
  position:sticky;top:52px;z-index:199}
.tabs{max-width:1280px;margin:0 auto;padding:0 2rem;display:flex;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  color:rgba(255,255,255,0.35);padding:11px 14px;border:none;background:none;cursor:pointer;
  border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;transition:color .15s}
.tab:hover{color:rgba(255,255,255,0.65)}
.tab.active{color:#fff;border-bottom-color:var(--blue)}

/* MAIN */
.main{max-width:1280px;margin:0 auto;padding:2.5rem 2rem}
.yr-section{display:none}.yr-section.active{display:block}

/* SECTION HEAD */
.sec-head{display:flex;align-items:center;gap:12px;margin-bottom:2rem;
  padding-bottom:1rem;border-bottom:1px solid var(--rule)}
.sec-title{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--light)}
.sec-stats{font-size:9px;color:var(--light);margin-left:auto}
.sec-hidden{font-size:9px;color:#b84040;margin-left:6px}

/* TOPIC CARDS */
.topic{background:var(--surface);border:1px solid var(--rule);margin-bottom:8px;
  border-left:3px solid transparent;transition:border-left-color .2s}
.topic.open{border-left-color:var(--blue)}
.topic-hd{display:flex;align-items:center;padding:13px 16px;cursor:pointer;gap:12px}
.topic-hd:hover .topic-name{color:var(--blue)}
.topic-name{font-size:12px;font-weight:600;color:var(--dark);flex:1;transition:color .15s}
.topic-count{font-size:9px;color:var(--light);letter-spacing:0.5px;text-transform:uppercase}
.topic-arrow{font-size:11px;color:var(--light);transition:transform .2s}
.topic.open .topic-arrow{transform:rotate(90deg)}

/* LESSONS Y5-9 */
.lessons{display:none;border-top:1px solid var(--rule);background:var(--bg)}
.topic.open .lessons{display:block}
.lesson{display:flex;align-items:center;padding:9px 16px 9px 28px;gap:12px;
  border-bottom:1px solid var(--rule)}
.lesson:last-child{border-bottom:none}
.lesson-name{font-size:10px;color:var(--mid);flex:1}
.chips{display:flex;gap:4px;flex-wrap:wrap}
.chip{font-size:8px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;
  padding:2px 8px;cursor:pointer;text-decoration:none;display:inline-block;transition:opacity .15s}
.chip:hover{opacity:.75}
.chip-video    {color:#b84040;background:#fdf2f2}
.chip-slides   {color:var(--blue);background:#ebf2fb}
.chip-quiz     {color:#2d7a50;background:#edf7f2}
.chip-worksheet{color:#7a5a20;background:#fdf7ee}
.chip-doc      {color:var(--mid);background:var(--rule)}
.chip-code     {color:#5a3a8a;background:#f3eefb}
.chip-link     {color:var(--mid);background:var(--rule)}
.chip-hidden   {opacity:.4;text-decoration:line-through}

/* SUBTOPICS iGCSE/IB */
.subtopics{display:none;border-top:1px solid var(--rule);background:var(--bg)}
.topic.open .subtopics{display:block}
.subtopic{border-bottom:1px solid var(--rule)}
.subtopic:last-child{border-bottom:none}
.sub-hd{display:flex;align-items:center;padding:8px 16px 8px 28px;cursor:pointer;gap:8px}
.sub-hd:hover .sub-name{color:var(--blue)}
.sub-name{font-size:10px;font-weight:600;color:var(--mid);flex:1;transition:color .15s}
.sub-arrow{font-size:9px;color:var(--light);transition:transform .15s}
.subtopic.open .sub-arrow{transform:rotate(90deg)}
.sub-lessons{display:none;background:#fff;border-top:1px solid var(--rule)}
.subtopic.open .sub-lessons{display:block}
.sub-lesson{display:flex;align-items:center;padding:7px 16px 7px 42px;gap:10px;
  border-bottom:1px solid var(--rule)}
.sub-lesson:last-child{border-bottom:none}
.sub-lesson-name{font-size:10px;color:var(--mid);flex:1}

/* HIDDEN BADGE */
.hidden-badge{font-size:8px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;
  color:#b84040;background:#fdf2f2;padding:2px 6px}

/* SEARCH */
.search-results{display:none}.search-results.active{display:block}
.sr-item{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid var(--rule);gap:12px;flex-wrap:wrap}
.sr-meta{font-size:9px;color:var(--light);letter-spacing:0.5px;text-transform:uppercase}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;min-height:50vh;
  font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--light)}

/* PASSWORD GATE */
#gate{position:fixed;inset:0;background:var(--dark);display:flex;align-items:center;justify-content:center;z-index:9999}
.gate-box{background:#fff;width:380px;max-width:90vw;padding:2.5rem}
.gate-stripe{height:3px;background:var(--blue);margin-bottom:2rem}
.gate-title{font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--dark);margin-bottom:.3rem}
.gate-sub{font-size:11px;color:var(--light);margin-bottom:2rem}
.gate-lbl{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--light);margin-bottom:.5rem}
.gate-input{width:100%;border:none;border-bottom:1px solid var(--rule);padding:.6rem 0;
  font-size:12px;font-family:inherit;outline:none;color:var(--dark);transition:border-color .2s}
.gate-input:focus{border-bottom-color:var(--blue)}
.gate-btn{margin-top:1.5rem;font-size:9px;font-weight:700;letter-spacing:2px;
  text-transform:uppercase;background:var(--dark);color:#fff;border:none;
  padding:.7rem 1.75rem;cursor:pointer;transition:background .2s}
.gate-btn:hover{background:var(--blue)}
.gate-err{font-size:10px;color:#b84040;margin-top:.6rem;display:none}

/* FOOTER */
footer{border-top:1px solid var(--rule);padding:1.25rem 2rem;display:flex;
  align-items:center;justify-content:space-between;background:var(--surface);margin-top:3rem}
.ft-l{font-size:9px;color:var(--light);letter-spacing:1.5px;text-transform:uppercase}
.ft-r{font-size:9px;color:var(--light)}

@media(max-width:640px){
  .hd,.main,footer{padding-left:1rem;padding-right:1rem}
  .tabs{padding:0 1rem}
  .hd-search{display:none}
}
</style>
</head>
<body>
<header>
  <div class="hd">
    <div class="hd-logo">NLCS Jeju</div>
    <div class="hd-sep"></div>
    <div class="hd-dept">Computer Science</div>
    <div class="hd-right">
      <div class="hd-search"><input type="text" id="searchInput" placeholder="Search resources"></div>
      <a href="teacher.html" class="hd-link">Staff &#8599;</a>
    </div>
  </div>
  <div class="blue-bar"></div>
</header>
<div class="tabs-bar"><div class="tabs" id="yearTabs"></div></div>
<div class="main" id="mainContent">
  <div class="loading" id="loadingEl">Loading &#8212;</div>
</div>
<footer>
  <div class="ft-l">CS Department &mdash; NLCS Jeju</div>
  <div class="ft-r" id="lastUpdated"></div>
</footer>
<script>
const SHEET_URL='https://docs.google.com/spreadsheets/d/e/2PACX-1vQVhR-gF88rl6ypPYwGkAlbK_jau3Qi9cnBHXd8eSMrMPbkxaThDD95jrBuj-wDoHRy4pQ9yrE5bP92/pub?gid=1154145124&single=true&output=csv';
document.addEventListener('DOMContentLoaded',()=>loadSheet(SHEET_URL,false));

const YEAR_ORDER=['Year 5','Year 6','Year 7','Year 8','Year 9','iGCSE','IB'];
const KS=new Set(['Year 5','Year 6','Year 7','Year 8','Year 9']);

function normaliseHeader(h){
  h=h.replace(/\n/g,' ').replace(/\s+/g,' ').trim().toLowerCase();
  if(h.includes('year group')) return 'Year Group';
  if(h==='topic') return 'Topic';
  if(h.startsWith('subtopic')) return 'Subtopic';
  if(h.startsWith('lesson')) return 'Lesson';
  if(h.includes('resource title')||h==='title') return 'Resource Title';
  if(h.includes('link')||h.includes('url')) return 'Link';
  if(h==='type') return 'Type';
  if(h.includes('show')) return 'Show to Students';
  if(h.includes('note')) return 'Notes';
  return h;
}

function parseCSV(text){
  function full(txt){
    const rows=[];let row=[],cur='',inQ=false;
    for(let i=0;i<txt.length;i++){
      const ch=txt[i];
      if(ch==='"'){if(inQ&&txt[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
      else if(ch===','&&!inQ){row.push(cur.trim());cur='';}
      else if((ch==='\n'||ch==='\r')&&!inQ){
        if(ch==='\r'&&txt[i+1]==='\n')i++;
        row.push(cur.trim());rows.push(row);row=[];cur='';
      } else cur+=ch;
    }
    if(cur||row.length)rows.push([...row,cur.trim()]);
    return rows;
  }
  const all=full(text);
  let hi=0;
  for(let i=0;i<Math.min(all.length,10);i++){
    if(all[i].some(c=>c.toLowerCase().includes('year group'))){hi=i;break;}
  }
  const hdrs=all[hi].map(h=>normaliseHeader(h.replace(/\n/g,' ')));
  return all.slice(hi+1).map(row=>{
    const r={};hdrs.forEach((h,i)=>r[h]=(row[i]||''));return r;
  }).filter(r=>r['Year Group']&&r['Topic']);
}

function buildTree(rows,tv){
  const tree={};
  rows.forEach(r=>{
    const yg=r['Year Group'],topic=r['Topic'],sub=r['Subtopic']||'',
      lesson=r['Lesson']||'',title=r['Resource Title'],link=r['Link'],
      type=r['Type']||'Link',
      show=/^(true|yes|1)$/i.test((r['Show to Students']||'').trim()),
      notes=r['Notes']||'';
    if(!title||!link||link==='#') return;
    if(!tv&&!show) return;
    if(!tree[yg])tree[yg]={};
    if(!tree[yg][topic])tree[yg][topic]={};
    const res={title,link,type,show,notes};
    if(KS.has(yg)){
      const les=lesson||'Resources';
      if(!tree[yg][topic][les])tree[yg][topic][les]=[];
      tree[yg][topic][les].push(res);
    } else {
      const s=sub||'General';
      if(!tree[yg][topic][s])tree[yg][topic][s]={};
      const les=lesson||s;
      if(!tree[yg][topic][s][les])tree[yg][topic][s][les]=[];
      tree[yg][topic][s][les].push(res);
    }
  });
  return tree;
}

function cc(t){
  const m={video:'chip-video',slides:'chip-slides',ppt:'chip-slides',
    doc:'chip-doc',document:'chip-doc',quiz:'chip-quiz',
    worksheet:'chip-worksheet',code:'chip-code',link:'chip-link'};
  return m[(t||'').toLowerCase()]||'chip-link';
}

function chip(r,tv){
  const hidden=!r.show;
  const cls='chip '+cc(r.type)+(hidden&&tv?' chip-hidden':'');
  const badge=hidden&&tv?' <span class="hidden-badge">Hidden</span>':'';
  const tip=r.notes?` title="${r.notes}"`:'';
  if(!r.link||r.link==='#') return `<span class="${cls}">${r.title}</span>${badge}`;
  return `<a href="${r.link}" target="_blank" rel="noopener" class="${cls}"${tip}>${r.title}</a>${badge}`;
}

function slug(s){return(s||'').replace(/[^a-z0-9]/gi,'_').toLowerCase().slice(0,50);}

function renderSite(rows,tv){
  const main=document.getElementById('mainContent');
  const tabsEl=document.getElementById('yearTabs');
  main.innerHTML='';tabsEl.innerHTML='';
  const srDiv=document.createElement('div');
  srDiv.className='search-results';srDiv.id='searchResults';
  main.appendChild(srDiv);
  const tree=buildTree(rows,tv);
  const years=YEAR_ORDER.filter(y=>tree[y]);
  if(!years.length){main.innerHTML+='<div class="loading">No resources found</div>';return;}

  years.forEach((yg,i)=>{
    const btn=document.createElement('button');
    btn.className='tab'+(i===0?' active':'');
    btn.textContent=yg;btn.dataset.year=yg;
    btn.addEventListener('click',()=>switchYear(yg));
    tabsEl.appendChild(btn);
  });

  years.forEach((yg,i)=>{
    const topics=tree[yg];
    const rc=rows.filter(r=>r['Year Group']===yg&&r['Link']&&r['Link']!=='#'
      &&(tv||/^(true|yes|1)$/i.test((r['Show to Students']||'').trim()))).length;
    const hc=tv?rows.filter(r=>r['Year Group']===yg
      &&!/^(true|yes|1)$/i.test((r['Show to Students']||'').trim())
      &&r['Link']&&r['Link']!=='#').length:0;
    const sec=document.createElement('div');
    sec.className='yr-section'+(i===0?' active':'');
    sec.id='sec_'+slug(yg);
    sec.innerHTML=`<div class="sec-head">
      <div class="sec-title">${yg}</div>
      <div class="sec-stats">${Object.keys(topics).length} topics &middot; ${rc} resources${tv&&hc?`<span class="sec-hidden">&middot; ${hc} hidden</span>`:''}</div>
    </div><div class="topics-list" id="tl_${slug(yg)}"></div>`;
    main.appendChild(sec);
    const tl=sec.querySelector('.topics-list');
    const isKS=KS.has(yg);

    Object.entries(topics).forEach(([topic,data],ti)=>{
      const el=document.createElement('div');
      el.className='topic'+(ti===0?' open':'');
      const tid='t_'+slug(yg+topic);
      let rc2=0,body='';
      if(isKS){
        body='<div class="lessons">';
        Object.entries(data).forEach(([les,res])=>{
          rc2+=res.length;
          body+=`<div class="lesson"><div class="lesson-name">${les}</div>
            <div class="chips">${res.map(r=>chip(r,tv)).join('')}</div></div>`;
        });
        body+='</div>';
      } else {
        body='<div class="subtopics">';
        Object.entries(data).forEach(([sub,lessons],si)=>{
          const sid='s_'+slug(yg+topic+sub);
          Object.values(lessons).forEach(a=>rc2+=a.length);
          body+=`<div class="subtopic${si===0?' open':''}" id="${sid}">
            <div class="sub-hd" onclick="toggleSub('${sid}')">
              <div class="sub-name">${sub}</div><div class="sub-arrow">▸</div>
            </div><div class="sub-lessons">`;
          Object.entries(lessons).forEach(([les,res])=>{
            body+=`<div class="sub-lesson"><div class="sub-lesson-name">${les}</div>
              <div class="chips">${res.map(r=>chip(r,tv)).join('')}</div></div>`;
          });
          body+='</div></div>';
        });
        body+='</div>';
      }
      el.innerHTML=`<div class="topic-hd" onclick="toggleTopic('${tid}')">
        <div class="topic-name">${topic}</div>
        <div class="topic-count">${rc2} resources</div>
        <div class="topic-arrow">&#9658;</div>
      </div>${body}`;
      el.id=tid;tl.appendChild(el);
    });
  });
  document.getElementById('lastUpdated').textContent=
    new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
}

function toggleTopic(id){const el=document.getElementById(id);if(el)el.classList.toggle('open');}
function toggleSub(id){const el=document.getElementById(id);if(el)el.classList.toggle('open');}
function switchYear(yg){
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.year===yg));
  document.querySelectorAll('.yr-section').forEach(s=>s.classList.toggle('active',s.id==='sec_'+slug(yg)));
  document.getElementById('searchResults').classList.remove('active');
  document.getElementById('searchInput').value='';
}

function initSearch(rows,tv){
  document.getElementById('searchInput').addEventListener('input',function(){
    const q=this.value.trim().toLowerCase();
    const sr=document.getElementById('searchResults');
    if(!q){sr.classList.remove('active');return;}
    sr.classList.add('active');
    const hits=rows.filter(r=>{
      if(!tv&&!/^(true|yes|1)$/i.test((r['Show to Students']||'').trim()))return false;
      if(!r['Link']||r['Link']==='#')return false;
      return['Resource Title','Topic','Subtopic','Lesson','Year Group'].some(k=>(r[k]||'').toLowerCase().includes(q));
    });
    if(!hits.length){sr.innerHTML='<div style="padding:2rem 0;font-size:9px;color:var(--light);letter-spacing:1.5px;text-transform:uppercase">No results</div>';return;}
    sr.innerHTML=`<div style="font-size:9px;color:var(--light);letter-spacing:1px;text-transform:uppercase;padding:.75rem 0 1rem">${hits.length} result${hits.length!==1?'s':''}</div>`+
      hits.map(r=>{
        const hidden=tv&&!/^(true|yes|1)$/i.test((r['Show to Students']||'').trim());
        return`<div class="sr-item">
          <a href="${r['Link']}" target="_blank" rel="noopener" class="chip ${cc(r['Type']||'link')}">${r['Resource Title']}</a>
          ${hidden?'<span class="hidden-badge">Hidden</span>':''}
          <div class="sr-meta">${r['Year Group']}${r['Topic']?' &middot; '+r['Topic']:''}${r['Lesson']?' &middot; '+r['Lesson']:''}</div>
        </div>`;
      }).join('');
  });
}

async function loadSheet(url,tv){
  try{
    const resp=await fetch(url+'&t='+Date.now());
    const rows=parseCSV(await resp.text());
    document.getElementById('loadingEl').style.display='none';
    renderSite(rows,tv);
    initSearch(rows,tv);
  }catch(e){
    document.getElementById('loadingEl').textContent='Could not load resources. '+e.message;
  }
}

</script>
</body>
</html>
