<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CS Staff — NLCS Jeju</title>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#fff;color:#1a2a3a;min-height:100vh}

/* ── VARIABLES ── */
:root{
  --blue:#3a75bf;
  --dark:#1a2a3a;
  --mid:#6b7c93;
  --light:#bbc5d0;
  --rule:#eaeef3;
  --bg:#f7f9fc;
}

/* ── HEADER ── */
header{border-bottom:0.5px solid var(--rule);position:sticky;top:0;background:#fff;z-index:100}
.hd{max-width:1200px;margin:0 auto;padding:0 2rem;display:flex;align-items:center;height:52px;gap:0}
.hd-logo{font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--dark)}
.hd-sep{width:1px;height:12px;background:var(--rule);margin:0 14px}
.hd-dept{font-size:10px;color:var(--mid);letter-spacing:2px;text-transform:uppercase}
.hd-right{margin-left:auto;display:flex;align-items:center;gap:1.5rem}
.hd-search{position:relative}
.hd-search input{font-size:10px;letter-spacing:0.5px;color:var(--dark);border:none;outline:none;
  background:none;width:180px;font-family:inherit;padding:4px 0;
  border-bottom:0.5px solid var(--rule);transition:border-color .2s}
.hd-search input:focus{border-bottom-color:var(--blue)}
.hd-search input::placeholder{color:var(--light);text-transform:uppercase;letter-spacing:1px;font-size:9px}
.hd-action{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--blue);cursor:pointer;text-decoration:none}

/* ── BLUE RULE ── */
.blue-rule{height:2px;background:var(--blue)}

/* ── YEAR TABS ── */
.tabs-wrap{border-bottom:0.5px solid var(--rule);background:#fff;position:sticky;top:52px;z-index:99}
.tabs{max-width:1200px;margin:0 auto;padding:0 2rem;display:flex;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--light);padding:11px 14px;border:none;background:none;cursor:pointer;
  border-bottom:1.5px solid transparent;margin-bottom:-0.5px;white-space:nowrap;
  transition:color .15s}
.tab:hover{color:var(--mid)}
.tab.active{color:var(--blue);border-bottom-color:var(--blue)}

/* ── MAIN ── */
.main{max-width:1200px;margin:0 auto;padding:2rem}

/* ── YEAR SECTION ── */
.yr-section{display:none}.yr-section.active{display:block}

/* ── SECTION HEADER ── */
.sec-head{display:flex;align-items:center;gap:14px;margin-bottom:1.75rem;padding-bottom:1rem;
  border-bottom:0.5px solid var(--rule)}
.sec-title{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--light)}
.sec-stats{font-size:9px;color:var(--light);letter-spacing:0.5px}

/* ── TOPIC LIST ── */
.topics{}
.topic{border-bottom:0.5px solid var(--rule)}
.topic:last-child{border-bottom:none}

.topic-hd{display:flex;align-items:center;padding:14px 0;cursor:pointer;gap:12px;
  transition:opacity .15s}
.topic-hd:hover .topic-name{color:var(--blue)}
.topic-name{font-size:12px;font-weight:600;color:var(--dark);flex:1;letter-spacing:0.1px;
  transition:color .15s}
.topic-meta{font-size:9px;color:var(--light);letter-spacing:0.5px;text-transform:uppercase}
.topic-chevron{font-size:10px;color:var(--light);transition:transform .2s;line-height:1}
.topic.open .topic-chevron{transform:rotate(90deg)}

/* ── LESSONS (Y5-9) ── */
.lessons{display:none;padding-bottom:12px}
.topic.open .lessons{display:block}
.lesson{display:flex;align-items:center;padding:8px 0 8px 16px;gap:12px;
  border-left:1px solid var(--rule)}
.lesson-name{font-size:10px;color:var(--mid);flex:1;letter-spacing:0.1px}
.chips{display:flex;gap:4px;flex-wrap:wrap}
.chip{font-size:8px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;
  padding:2px 7px;cursor:pointer;text-decoration:none;display:inline-block;transition:opacity .15s}
.chip:hover{opacity:.7}
.chip-video  {color:#b84040;background:#fdf2f2}
.chip-slides {color:var(--blue);background:#f0f5fc}
.chip-quiz   {color:#2d7a50;background:#f0faf4}
.chip-worksheet{color:#7a5a20;background:#fdf8f0}
.chip-doc    {color:var(--mid);background:var(--rule)}
.chip-code   {color:#5a3a8a;background:#f5f0fc}
.chip-link   {color:var(--mid);background:var(--rule)}

/* ── SUBTOPICS (iGCSE/IB) ── */
.subtopics{display:none;padding-bottom:12px}
.topic.open .subtopics{display:block}
.subtopic{margin-bottom:6px;padding-left:16px;border-left:1px solid var(--rule)}
.sub-hd{display:flex;align-items:center;padding:6px 0;cursor:pointer;gap:8px}
.sub-hd:hover .sub-name{color:var(--blue)}
.sub-name{font-size:10px;font-weight:600;color:var(--mid);flex:1;letter-spacing:0.1px;
  transition:color .15s}
.sub-arrow{font-size:9px;color:var(--light);transition:transform .15s}
.subtopic.open .sub-arrow{transform:rotate(90deg)}
.sub-lessons{display:none;padding-left:14px;border-left:1px solid var(--rule)}
.subtopic.open .sub-lessons{display:block}
.sub-lesson{display:flex;align-items:center;padding:6px 0;gap:10px}
.sub-lesson-name{font-size:10px;color:var(--mid);flex:1}

/* ── HIDDEN BADGE ── */
.hidden-badge{font-size:8px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;
  color:#b84040;background:#fdf2f2;padding:1px 5px}

/* ── STAFF BADGE ── */
.staff-badge{font-size:8px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  color:var(--blue);background:#f0f5fc;padding:2px 8px}

/* ── SEARCH RESULTS ── */
.search-results{display:none}.search-results.active{display:block}
.sr-item{display:flex;align-items:center;padding:10px 0;border-bottom:0.5px solid var(--rule);gap:12px}
.sr-meta{font-size:9px;color:var(--light);letter-spacing:0.5px;text-transform:uppercase}

/* ── LOADING ── */
.loading{display:flex;align-items:center;justify-content:center;min-height:50vh;
  font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--light)}

/* ── FOOTER ── */
footer{border-top:0.5px solid var(--rule);padding:1rem 2rem;
  display:flex;align-items:center;justify-content:space-between;margin-top:3rem}
.ft-left{font-size:9px;color:var(--light);letter-spacing:1.5px;text-transform:uppercase}
.ft-right{font-size:9px;color:var(--light)}

/* ── SETUP BANNER ── */
.setup-banner{border:0.5px solid var(--rule);padding:1.25rem 1.5rem;margin-bottom:2rem;
  border-left:2px solid var(--blue)}
.setup-banner h3{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--dark);margin-bottom:.5rem}
.setup-banner p{font-size:11px;color:var(--mid);line-height:1.7}
.setup-banner code{font-family:monospace;font-size:10px;background:var(--bg);
  padding:.1rem .4rem;color:var(--blue)}

/* ── PASSWORD GATE ── */
#gate{position:fixed;inset:0;background:#fff;display:flex;align-items:center;
  justify-content:center;z-index:9999}
.gate-inner{width:360px;max-width:90vw;text-align:left}
.gate-rule{height:2px;background:var(--blue);width:32px;margin-bottom:1.5rem}
.gate-title{font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;
  color:var(--dark);margin-bottom:.35rem}
.gate-sub{font-size:11px;color:var(--mid);margin-bottom:2rem}
.gate-label{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--light);margin-bottom:.5rem}
.gate-input{width:100%;border:none;border-bottom:1px solid var(--rule);padding:.6rem 0;
  font-size:12px;font-family:inherit;outline:none;color:var(--dark);
  transition:border-color .2s;letter-spacing:.05em}
.gate-input:focus{border-bottom-color:var(--blue)}
.gate-btn{margin-top:1.5rem;font-size:9px;font-weight:700;letter-spacing:2px;
  text-transform:uppercase;background:var(--dark);color:#fff;border:none;
  padding:.65rem 1.5rem;cursor:pointer;transition:background .2s}
.gate-btn:hover{background:var(--blue)}
.gate-error{font-size:10px;color:#b84040;margin-top:.75rem;display:none}
.gate-hint{font-size:9px;color:var(--light);margin-top:1.5rem;letter-spacing:.5px}
.gate-hint code{font-family:monospace;font-size:9px}

@media(max-width:640px){
  .hd{padding:0 1rem}
  .main{padding:1.5rem 1rem}
  .tabs{padding:0 1rem}
  .hd-search{display:none}
  footer{padding:1rem}
}
</style>
<style>
.chip-hidden{opacity:.35;text-decoration:line-through}
</style>
</head>
<body>

<!-- PASSWORD GATE -->
<div id="gate">
  <div class="gate-inner">
    <div class="gate-rule"></div>
    <div class="gate-title">NLCS Jeju</div>
    <div class="gate-sub">Computer Science — Staff Access</div>
    <div class="gate-label">Password</div>
    <input type="password" class="gate-input" id="pwInput"
      placeholder="Enter password"
      onkeydown="if(event.key==='Enter')checkPw()">
    <div class="gate-error" id="pwError">Incorrect password</div>
    <button class="gate-btn" onclick="checkPw()">Sign in</button>
    <div class="gate-hint">Password set in <code>STAFF_PASSWORD</code></div>
  </div>
</div>

<header style="display:none" id="siteHeader">
  <div class="hd">
    <div class="hd-logo">NLCS Jeju</div>
    <div class="hd-sep"></div>
    <div class="hd-dept">Computer Science</div>
    <div class="hd-right">
      <div class="hd-search">
        <input type="text" id="searchInput" placeholder="Search resources">
      </div>
      <span class="staff-badge">Staff View</span>
      <a href="index.html" class="hd-action">Student site ↗</a>
    </div>
  </div>
  <div class="blue-rule"></div>
</header>

<div class="tabs-wrap" style="display:none" id="tabsWrap">
  <div class="tabs" id="yearTabs"></div>
</div>

<div class="main" id="mainContent" style="display:none">
  <div class="loading" id="loadingEl">Loading resources&nbsp;&nbsp;&mdash;</div>
</div>

<footer style="display:none" id="siteFooter">
  <div class="ft-left">CS Department Hub — Staff View</div>
  <div class="ft-right" id="lastUpdated"></div>
</footer>

<script>
const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQVhR-gF88rl6ypPYwGkAlbK_jau3Qi9cnBHXd8eSMrMPbkxaThDD95jrBuj-wDoHRy4pQ9yrE5bP92/pub?gid=1154145124&single=true&output=csv';
const STAFF_PASSWORD = 'cs-staff-2025';

function checkPw(){
  if(document.getElementById('pwInput').value===STAFF_PASSWORD){
    document.getElementById('gate').style.display='none';
    document.getElementById('siteHeader').style.display='';
    document.getElementById('tabsWrap').style.display='';
    document.getElementById('mainContent').style.display='';
    document.getElementById('siteFooter').style.display='';
    loadSheet(SHEET_URL,true);
  }else{
    document.getElementById('pwError').style.display='block';
    document.getElementById('pwInput').value='';
  }
}


const YEAR_ORDER=['Year 5','Year 6','Year 7','Year 8','Year 9','iGCSE','IB'];
const KS=new Set(['Year 5','Year 6','Year 7','Year 8','Year 9']);

function normaliseHeader(h){
  h=h.replace(/\n/g,' ').replace(/\s+/g,' ').trim().toLowerCase();
  if(h.includes('year group')) return 'Year Group';
  if(h==='topic') return 'Topic';
  if(h.startsWith('subtopic')) return 'Subtopic';
  if(h.startsWith('lesson')) return 'Lesson';
  if(h.includes('resource title')||h==='title') return 'Resource Title';
  if(h.includes('link')||h.includes('url')) return 'Link';
  if(h==='type') return 'Type';
  if(h.includes('show')) return 'Show to Students';
  if(h.includes('note')) return 'Notes';
  return h;
}

function parseCSV(text){
  function fullParse(txt){
    const rows=[];let row=[],cur='',inQ=false;
    for(let i=0;i<txt.length;i++){
      const ch=txt[i];
      if(ch==='"'){if(inQ&&txt[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
      else if(ch===','&&!inQ){row.push(cur.trim());cur='';}
      else if((ch==='\n'||ch==='\r')&&!inQ){
        if(ch==='\r'&&txt[i+1]==='\n')i++;
        row.push(cur.trim());rows.push(row);row=[];cur='';
      } else cur+=ch;
    }
    if(cur||row.length)rows.push([...row,cur.trim()]);
    return rows;
  }
  const allRows=fullParse(text);
  let headerIdx=0;
  for(let i=0;i<Math.min(allRows.length,10);i++){
    if(allRows[i].some(c=>c.toLowerCase().includes('year group'))){headerIdx=i;break;}
  }
  const headers=allRows[headerIdx].map(h=>normaliseHeader(h.replace(/\n/g,' ')));
  return allRows.slice(headerIdx+1).map(row=>{
    const r={};headers.forEach((h,i)=>r[h]=(row[i]||''));return r;
  }).filter(r=>r['Year Group']&&r['Topic']);
}

function buildTree(rows,teacherView){
  const tree={};
  rows.forEach(r=>{
    const yg=r['Year Group'],topic=r['Topic'],sub=r['Subtopic']||'',
      lesson=r['Lesson']||'',title=r['Resource Title'],link=r['Link'],
      type=r['Type']||'Link',
      show=/^(true|yes|1)$/i.test((r['Show to Students']||'').trim());
    if(!title||!link||link==='#') return;
    if(!teacherView&&!show) return;
    if(!tree[yg])tree[yg]={};
    if(!tree[yg][topic])tree[yg][topic]={};
    const res={title,link,type,show};
    if(KS.has(yg)){
      const les=lesson||'Resources';
      if(!tree[yg][topic][les])tree[yg][topic][les]=[];
      tree[yg][topic][les].push(res);
    } else {
      const s=sub||'General';
      if(!tree[yg][topic][s])tree[yg][topic][s]={};
      const les=lesson||s;
      if(!tree[yg][topic][s][les])tree[yg][topic][s][les]=[];
      tree[yg][topic][s][les].push(res);
    }
  });
  return tree;
}

function chipClass(t){
  const m={video:'chip-video',slides:'chip-slides',ppt:'chip-slides',
    doc:'chip-doc',document:'chip-doc',quiz:'chip-quiz',
    worksheet:'chip-worksheet',code:'chip-code',link:'chip-link'};
  return m[(t||'').toLowerCase()]||'chip-link';
}

function chipHTML(r,teacherView){
  const hidden=!r.show;
  const cls='chip '+chipClass(r.type)+(hidden&&teacherView?' chip-hidden':'');
  const badge=hidden&&teacherView?' <span class="hidden-badge">Hidden</span>':'';
  if(!r.link||r.link==='#') return `<span class="${cls}">${r.title}</span>${badge}`;
  return `<a href="${r.link}" target="_blank" rel="noopener" class="${cls}" title="${r.notes||r.title}">${r.title}</a>${badge}`;
}

function slug(s){return(s||'').replace(/[^a-z0-9]/gi,'_').toLowerCase().slice(0,50);}

function renderSite(rows,teacherView){
  const main=document.getElementById('mainContent');
  const tabsEl=document.getElementById('yearTabs');
  main.innerHTML='';tabsEl.innerHTML='';

  const srDiv=document.createElement('div');
  srDiv.className='search-results';srDiv.id='searchResults';
  main.appendChild(srDiv);

  const tree=buildTree(rows,teacherView);
  const years=YEAR_ORDER.filter(y=>tree[y]);
  if(!years.length){
    main.innerHTML+='<div class="loading">No resources found</div>';return;
  }

  years.forEach((yg,i)=>{
    const btn=document.createElement('button');
    btn.className='tab'+(i===0?' active':'');
    btn.textContent=yg;btn.dataset.year=yg;
    btn.addEventListener('click',()=>switchYear(yg));
    tabsEl.appendChild(btn);
  });

  years.forEach((yg,i)=>{
    const topics=tree[yg];
    const topicCount=Object.keys(topics).length;
    const resCount=rows.filter(r=>r['Year Group']===yg&&r['Link']&&r['Link']!=='#'
      &&(teacherView||/^(true|yes|1)$/i.test((r['Show to Students']||'').trim()))).length;
    const hiddenCount=teacherView?rows.filter(r=>r['Year Group']===yg
      &&!/^(true|yes|1)$/i.test((r['Show to Students']||'').trim())
      &&r['Link']&&r['Link']!=='#').length:0;

    const sec=document.createElement('div');
    sec.className='yr-section'+(i===0?' active':'');
    sec.id='sec_'+slug(yg);

    let statsText=topicCount+' topics · '+resCount+' resources';
    if(teacherView&&hiddenCount) statsText+=' · '+hiddenCount+' hidden';

    sec.innerHTML=`<div class="sec-head">
      <div class="sec-title">${yg}</div>
      ${teacherView?'<span class="staff-badge">Staff View</span>':''}
      <div class="sec-stats">${statsText}</div>
    </div>
    <div class="topics" id="topics_${slug(yg)}"></div>`;
    main.appendChild(sec);

    const topicsEl=sec.querySelector('.topics');
    const isKS=KS.has(yg);

    Object.entries(topics).forEach(([topic,data],ti)=>{
      const topicEl=document.createElement('div');
      topicEl.className='topic'+(ti===0?' open':'');
      const tid='t_'+slug(yg+topic);

      let resCount2=0;
      let bodyHTML='';

      if(isKS){
        // Y5-9: topic → lesson → chips
        bodyHTML='<div class="lessons">';
        Object.entries(data).forEach(([lesson,resources])=>{
          resCount2+=resources.length;
          bodyHTML+=`<div class="lesson">
            <div class="lesson-name">${lesson}</div>
            <div class="chips">${resources.map(r=>chipHTML(r,teacherView)).join('')}</div>
          </div>`;
        });
        bodyHTML+='</div>';
      } else {
        // iGCSE/IB: topic → subtopic → lesson → chips
        bodyHTML='<div class="subtopics">';
        Object.entries(data).forEach(([sub,lessons],si)=>{
          const subId='s_'+slug(yg+topic+sub);
          const subRes=Object.values(lessons).flat();
          resCount2+=subRes.length;
          bodyHTML+=`<div class="subtopic${si===0?' open':''}" id="${subId}">
            <div class="sub-hd" onclick="toggleSub('${subId}')">
              <div class="sub-name">${sub}</div>
              <div class="sub-arrow">▸</div>
            </div>
            <div class="sub-lessons">`;
          Object.entries(lessons).forEach(([lesson,resources])=>{
            bodyHTML+=`<div class="sub-lesson">
              <div class="sub-lesson-name">${lesson}</div>
              <div class="chips">${resources.map(r=>chipHTML(r,teacherView)).join('')}</div>
            </div>`;
          });
          bodyHTML+='</div></div>';
        });
        bodyHTML+='</div>';
      }

      topicEl.innerHTML=`<div class="topic-hd" onclick="toggleTopic('${tid}')">
        <div class="topic-name">${topic}</div>
        <div class="topic-meta">${resCount2} resources</div>
        <div class="topic-chevron">▸</div>
      </div>${bodyHTML}`;
      topicEl.id=tid;
      topicsEl.appendChild(topicEl);
    });
  });

  document.getElementById('lastUpdated').textContent=new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
}

function toggleTopic(id){
  const el=document.getElementById(id);if(el)el.classList.toggle('open');
}
function toggleSub(id){
  const el=document.getElementById(id);if(el)el.classList.toggle('open');
}
function switchYear(yg){
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.year===yg));
  document.querySelectorAll('.yr-section').forEach(s=>s.classList.toggle('active',s.id==='sec_'+slug(yg)));
  document.getElementById('searchResults').classList.remove('active');
  document.getElementById('searchInput').value='';
}

function initSearch(rows,teacherView){
  document.getElementById('searchInput').addEventListener('input',function(){
    const q=this.value.trim().toLowerCase();
    const sr=document.getElementById('searchResults');
    if(!q){sr.classList.remove('active');return;}
    sr.classList.add('active');
    const hits=rows.filter(r=>{
      if(!teacherView&&!/^(true|yes|1)$/i.test((r['Show to Students']||'').trim()))return false;
      if(!r['Link']||r['Link']==='#')return false;
      return['Resource Title','Topic','Subtopic','Lesson','Year Group']
        .some(k=>(r[k]||'').toLowerCase().includes(q));
    });
    if(!hits.length){sr.innerHTML='<div style="padding:2rem 0;font-size:10px;color:var(--light);letter-spacing:1px;text-transform:uppercase">No results</div>';return;}
    sr.innerHTML=`<div style="font-size:9px;color:var(--light);letter-spacing:1px;text-transform:uppercase;margin-bottom:1rem;padding-top:.5rem">${hits.length} result${hits.length!==1?'s':''}</div>`+
      hits.map(r=>{
        const hidden=teacherView&&!/^(true|yes|1)$/i.test((r['Show to Students']||'').trim());
        return`<div class="sr-item">
          <a href="${r['Link']}" target="_blank" rel="noopener" class="chip ${chipClass(r['Type']||'link')}">${r['Resource Title']}</a>
          ${hidden?'<span class="hidden-badge">Hidden</span>':''}
          <div class="sr-meta">${r['Year Group']}${r['Topic']?' · '+r['Topic']:''}${r['Lesson']?' · '+r['Lesson']:''}</div>
        </div>`;
      }).join('');
  });
}

async function loadSheet(url,teacherView){
  try{
    const resp=await fetch(url+'&t='+Date.now());
    const text=await resp.text();
    const rows=parseCSV(text);
    document.getElementById('loadingEl').style.display='none';
    renderSite(rows,teacherView);
    initSearch(rows,teacherView);
  }catch(e){
    document.getElementById('loadingEl').textContent='Could not load resources. '+e.message;
  }
}

</script>
</body>
</html>
